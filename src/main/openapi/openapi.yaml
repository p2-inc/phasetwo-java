      - application/json
      x-tags:
      - tag: Organizations
    post:
      description: Accept invitation for authenticated user.
      operationId: acceptInvitation
      parameters:
      - description: realm name (not id!)
        explode: false
        in: path
        name: realm
        required: true
        schema:
          type: string
        style: simple
      - description: invitation UUID
        explode: false
        in: path
        name: invitationId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: success
      summary: Accept invitation for authenticated user
      tags:
