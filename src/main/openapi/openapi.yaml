      x-accepts:
      - application/json
      - application/octet-stream
      x-tags:
      - tag: Organizations
  /{realm}/orgs/import:
    post:
      description: Import organizations and their configurations into this realm
      operationId: importOrganizations
      parameters:
      - description: realm name (not id!)
        explode: false
        in: path
        name: realm
        required: true
        schema:
          type: string
        style: simple
      - description: Skip organizations that already exist instead of updating them
        explode: true
        in: query
        name: skipExisting
        required: false
        schema:
          default: false
          type: boolean
        style: form
