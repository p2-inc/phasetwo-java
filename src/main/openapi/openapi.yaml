      operationId: exportOrganizations
      parameters:
      - description: realm name (not id!)
        explode: false
        in: path
        name: realm
        required: true
        schema:
          type: string
        style: simple
      - description: Include organization members in the export
        explode: true
        in: query
        name: includeMembers
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: Include organization roles in the export
        explode: true
        in: query
        name: includeRoles
        required: false
        schema:
          default: true
          type: boolean
        style: form
      - description: Include identity providers in the export
        explode: true
        in: query
        name: includeIdps
        required: false
        schema:
          default: true
          type: boolean
        style: form
      - description: "Specific organization IDs to export (if not provided, exports\
